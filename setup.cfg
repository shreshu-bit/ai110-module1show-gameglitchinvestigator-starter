[flake8]
# PEP 8 permits raising the 79-char line limit to 99 for teams that agree
# (see PEP 8, "Maximum Line Length"). We use 99 so descriptive f-strings and
# inline comments stay on one line without harming readability.
max-line-length = 99
exclude =
    .venv,
    .git,
    __pycache__,
    .pytest_cache
